<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>IgniteAI Agent</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible+Next:ital,wght@0,200..800;1,200..800&family=Inclusive+Sans:ital,wght@0,300..700;1,300..700&display=swap" rel="stylesheet">
<style>
  /* ---- InstUI "light" (Ignite) tokens ---- */
  :root {
    --font-heading: "Atkinson Hyperlegible Next", sans-serif;
    --font-body: "Atkinson Hyperlegible Next", sans-serif;
    --text: #273540;
    --text-muted: #576773;
    --text-success: #037D37;
    --text-error: #CF1F24;
    --surface: #ffffff;
    --page: #F2F4F5;
    --ai-top: #9E58BD;
    --ai-bottom: #00828E;
    --stroke-base: #8D959F;
    --stroke-muted: #E8EAEC;
    --stroke-strong: #5F6E7A;
    --link: #2369A4;
    --info: #2B7ABC;
    --brand: #1D354F;
    --chip-bg: #D5E2F6;
    --alert-success: #03893D;
    --spinner: #2871AF;
    --spinner-track: rgba(35, 68, 101, 0.1);
    --radius-card-sm: 12px;
    --radius-card-md: 16px;
    --radius-card-lg: 24px;
    --shadow-resting: 0 2px 6px rgba(0, 29, 55, 0.08), 0 1px 2px rgba(0, 29, 55, 0.06);
    --pad: 16px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: transparent;
    font-family: var(--font-body);
    font-size: 16px;
    line-height: 1.5;
    color: var(--text);
    padding: var(--pad);
    -webkit-font-smoothing: antialiased;
  }
  svg { display: block; }
  button { font: inherit; color: inherit; background: none; border: none; cursor: pointer; }

  @keyframes agent-fade-in { from { opacity: 0; } to { opacity: 1; } }
  @keyframes agent-ellipsis-dot2 { 0%, 33% { opacity: 0; } 34%, 100% { opacity: 1; } }
  @keyframes agent-ellipsis-dot3 { 0%, 66% { opacity: 0; } 67%, 100% { opacity: 1; } }
  @keyframes agent-wave {
    0% { transform: rotate(0deg); } 20% { transform: rotate(20deg); }
    40% { transform: rotate(-15deg); } 60% { transform: rotate(18deg); }
    80% { transform: rotate(-8deg); } 100% { transform: rotate(0deg); }
  }
  @keyframes agent-spin { to { transform: rotate(360deg); } }
  .fade0   { opacity: 0; animation: agent-fade-in 300ms ease-in-out 0ms both; }
  .fade300 { opacity: 0; animation: agent-fade-in 300ms ease-in-out 300ms both; }
  .fade600 { opacity: 0; animation: agent-fade-in 300ms ease-in-out 600ms both; }

  /* ---- Shell ---- */
  .panel {
    height: 100%;
    display: flex;
    flex-direction: column;
    background: var(--surface);
    border-radius: var(--radius-card-lg);
    box-shadow: var(--shadow-resting);
    overflow: hidden;
  }
  .hdr {
    flex: none;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px;
    background: linear-gradient(to right, var(--ai-top) 0%, var(--ai-bottom) 100%);
  }
  .hdr-title { display: flex; align-items: center; gap: 8px; color: #fff; }
  .hdr-title h2 {
    font-family: var(--font-heading);
    font-size: 1.25rem; font-weight: 700; line-height: 1.25; color: #fff;
  }
  .hdr-actions { display: flex; align-items: center; gap: 12px; }
  .icon-btn {
    display: inline-flex; align-items: center; justify-content: center;
    width: 32px; height: 32px; border-radius: 8px; flex: none;
    transition: background-color 120ms;
  }
  .hdr .icon-btn { color: #fff; }
  .hdr .icon-btn:hover { background: rgba(255, 255, 255, 0.15); }
  .icon-btn.grey { color: var(--text); }
  .icon-btn.grey:hover { background: var(--page); }

  /* ---- Scroll area ---- */
  .scroller {
    flex: 1 1 0;
    min-height: 0;
    overflow-y: auto;
    overflow-anchor: none;
    scrollbar-gutter: stable;
  }

  /* ---- Welcome ---- */
  .welcome { padding: 52px 36px 36px; display: flex; flex-direction: column; gap: 38px; }
  .hello-row { display: flex; align-items: center; gap: 8px; }
  .hand-wrap { display: inline-block; flex-shrink: 0; transform-origin: bottom center; }
  .hand-rot { display: inline-block; transform: rotate(-35deg); color: #171717; }
  .hello-group { display: flex; flex-direction: column; gap: 12px; }
  h2.hello {
    font-family: var(--font-heading);
    font-size: 1.75rem; font-weight: 600; line-height: 1.25;
    background: linear-gradient(90deg, var(--ai-top) 20%, var(--ai-bottom) 81%);
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent; color: transparent;
    width: fit-content;
  }
  .muted { color: var(--text-muted); }
  .sect { display: flex; flex-direction: column; gap: 12px; }
  .sect h3 { font-family: var(--font-heading); font-size: 1rem; font-weight: 700; line-height: 1.25; }
  .start-card {
    display: flex; align-items: center; gap: 16px; width: 100%; text-align: left;
    background: var(--surface); border: 1px solid var(--stroke-muted);
    border-radius: var(--radius-card-lg); padding: 12px 24px;
    transition: background-color 120ms;
  }
  .start-card:hover { background: #FAFBFC; }
  .start-card .icon { color: #0870A3; flex: none; }
  .start-card .lines { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
  .start-card .label { font-weight: 700; }
  .start-card .desc { font-size: 0.875rem; color: var(--text-muted); }
  .chip-btn {
    display: block; width: 100%; text-align: left;
    background: var(--chip-bg); color: var(--brand);
    font-weight: 600; font-size: 1rem; line-height: 1.5;
    border-radius: 16px; min-height: 2.5rem; padding: 9px 20px;
    transition: background-color 120ms;
  }
  .chip-btn:hover { background: #C3D6F2; }
  .chip-stack { display: flex; flex-direction: column; gap: 14px; }

  /* ---- Conversation ---- */
  .chat { padding: 24px; display: flex; flex-direction: column; gap: 36px; }
  .turn { display: flex; flex-direction: column; gap: 24px; }
  .user-row { display: flex; justify-content: flex-end; padding-left: 36px; }
  .user-card {
    background: var(--surface); border-radius: var(--radius-card-md);
    box-shadow: var(--shadow-resting); padding: 16px;
  }
  .resp { display: flex; flex-direction: column; gap: 12px; }
  .resp-hdr { display: flex; align-items: center; gap: 8px; }
  .resp-hdr.done { gap: 6px; color: var(--text-success); font-weight: 700; }
  .task { font-weight: 700; color: var(--text-muted); }
  .dots span { font-weight: 700; color: var(--text-muted); }
  .dots .d2 { animation: agent-ellipsis-dot2 0.9s linear infinite; opacity: 0; }
  .dots .d3 { animation: agent-ellipsis-dot3 0.9s linear infinite; opacity: 0; }
  .spinner {
    width: 16px; height: 16px; flex: none; border-radius: 50%;
    border: 2.5px solid var(--spinner-track); border-top-color: var(--spinner);
    animation: agent-spin 0.9s linear infinite;
  }
  .lnk { color: var(--link); font-weight: 600; text-decoration: underline; text-underline-offset: 2px; }
  .lnk:hover { color: #174E7C; }

  .actions { display: flex; gap: 6px; }
  .actions .icon-btn { color: var(--text); }

  /* ---- Artifact / tool approval card ---- */
  .artifact {
    background: var(--surface); border: 1px solid var(--stroke-muted);
    border-radius: var(--radius-card-md); box-shadow: var(--shadow-resting);
  }
  .art-hdr { display: flex; align-items: center; justify-content: space-between; padding: 16px; }
  .art-hdr h3 { font-family: var(--font-heading); font-size: 1rem; font-weight: 700; line-height: 1.25; }
  .connector-chip {
    display: inline-flex; align-items: center; gap: 6px;
    border: 1px solid var(--info); border-radius: 8px; background: var(--surface);
    padding: 2px 8px; height: 28px;
  }
  .connector-chip .clabel { font-size: 0.875rem; }
  .param { border-top: 1px solid var(--stroke-muted); padding: 16px; display: flex; flex-direction: column; gap: 2px; }
  .param-row { display: flex; align-items: center; justify-content: space-between; }
  .param-row .plabel { font-weight: 700; }
  .kebab-wrap { position: relative; }
  .kebab-menu {
    position: absolute; right: 0; top: 34px; z-index: 10;
    background: var(--surface); border: 1px solid var(--stroke-muted);
    border-radius: 8px; box-shadow: 0 4px 12px rgba(0, 29, 55, 0.15);
    min-width: 140px; padding: 4px; display: none;
  }
  .kebab-menu.open { display: block; }
  .kebab-menu button {
    display: flex; align-items: center; gap: 12px; width: 100%;
    padding: 8px 12px; border-radius: 6px; text-align: left; color: var(--text);
  }
  .kebab-menu button:hover { background: var(--page); }
  .kebab-menu .mi { color: var(--text-muted); }
  .art-body { border-top: 1px solid var(--stroke-muted); padding: 16px; }
  .plan { display: flex; flex-direction: column; gap: 12px; }
  .plan .ptitle { font-weight: 700; }
  .plan ul { margin: 0 0 0 22px; display: flex; flex-direction: column; gap: 8px; }
  .art-footer { border-top: 1px solid var(--stroke-muted); }
  .approval { padding: 16px; display: flex; flex-direction: column; gap: 12px; }
  .approval-btns { display: flex; gap: 12px; }
  .ghost-btn {
    flex: 1 1 0; display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    height: 40px; border-radius: 12px; font-weight: 600; font-size: 1rem;
    border: 1px solid currentColor; background: transparent;
    transition: background-color 120ms;
  }
  .ghost-btn.ok { color: var(--text-success); }
  .ghost-btn.ok:hover:not(:disabled) { background: rgba(3, 125, 55, 0.06); }
  .ghost-btn.no { color: var(--text-error); }
  .ghost-btn.no:hover:not(:disabled) { background: rgba(207, 31, 36, 0.06); }
  .ghost-btn:disabled { opacity: 0.5; cursor: default; }
  .approval-hint { text-align: center; font-size: 0.875rem; color: var(--text-muted); }
  .alert-success {
    display: flex; align-items: center; gap: 12px;
    border: 2px solid var(--alert-success); border-radius: 12px;
    background: var(--surface); padding: 12px 16px;
  }
  .alert-success .aicon { color: var(--alert-success); flex: none; }

  /* ---- Resource card ---- */
  .resource {
    display: flex; align-items: center; gap: 16px;
    background: var(--surface); border: 1px solid var(--stroke-muted);
    border-radius: var(--radius-card-md); box-shadow: var(--shadow-resting);
    padding: 12px 16px;
  }
  .resource .lines { display: flex; flex-direction: column; gap: 2px; flex: 1 1 0; min-width: 0; }
  .resource .sub { font-size: 0.875rem; color: var(--text-muted); }
  .resource .ext { color: var(--text-muted); flex: none; }

  /* ---- Footer / prompt ---- */
  .foot { flex: none; }
  .prompt-box {
    margin: 0 16px;
    background: var(--surface);
    border: 2px solid var(--stroke-strong);
    border-radius: var(--radius-card-md);
    padding: 16px;
  }
  .prompt-box:focus-within { outline: 2px solid var(--info); outline-offset: 2px; }
  .prompt-label { font-size: 0.875rem; font-weight: 600; color: var(--text); display: block; margin-bottom: 12px; }
  .prompt-box textarea {
    width: 100%; border: none; outline: none; resize: none; overflow: hidden;
    background: transparent; font-family: inherit; font-size: 1rem; line-height: 1.5;
    color: inherit; padding: 0; display: block;
  }
  .prompt-box textarea::placeholder { color: var(--text-muted); }
  .prompt-controls { display: flex; align-items: center; justify-content: space-between; margin-top: 24px; }
  .send-btn {
    width: 32px; height: 32px; border-radius: 50%; flex: none;
    display: inline-flex; align-items: center; justify-content: center;
    background: var(--stroke-base); color: #fff;
    transition: background-color 150ms;
  }
  .send-btn.ready { background: var(--brand); }
  .disclaimer { margin: 8px 16px 12px; font-size: 0.875rem; color: var(--text); text-align: center; }
</style>
</head>
<body>
<div class="panel">
  <div class="hdr">
    <div class="hdr-title">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M11.0621 2.53451C11.3843 1.66389 12.6157 1.66389 12.9379 2.53451L15.0815 8.32767C15.1828 8.60139 15.3986 8.8172 15.6723 8.91848L21.4655 11.0621C22.3361 11.3843 22.3361 12.6157 21.4655 12.9379L15.6723 15.0815C15.3986 15.1828 15.1828 15.3986 15.0815 15.6723L12.9379 21.4655C12.6157 22.3361 11.3843 22.3361 11.0621 21.4655L8.91849 15.6723C8.8172 15.3986 8.60139 15.1828 8.32767 15.0815L2.53451 12.9379C1.66389 12.6157 1.66389 11.3843 2.53451 11.0621L8.32767 8.91849C8.60139 8.8172 8.8172 8.60139 8.91848 8.32767L11.0621 2.53451Z" fill="currentColor"/><path d="M19.5311 1.26725C19.6922 0.831943 20.3078 0.831944 20.4689 1.26725L21.0804 2.91964L22.7327 3.53107C23.1681 3.69215 23.1681 4.30785 22.7327 4.46893L21.0804 5.08036L20.4689 6.73275C20.3078 7.16806 19.6922 7.16806 19.5311 6.73275L18.9196 5.08036L17.2673 4.46893C16.8319 4.30785 16.8319 3.69215 17.2673 3.53107L18.9196 2.91964L19.5311 1.26725Z" fill="currentColor"/></svg>

      <button class="icon-btn" aria-label="Close"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg></button>
    </div>
  </div>

  <div class="scroller" id="scroller">

      <div class="hello-group">

          <span class="hand-wrap" id="handWrap"><span class="hand-rot"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 11V6a2 2 0 0 0-2-2a2 2 0 0 0-2 2"/><path d="M14 10V4a2 2 0 0 0-2-2a2 2 0 0 0-2 2v2"/><path d="M10 10.5V6a2 2 0 0 0-2-2a2 2 0 0 0-2 2v8"/><path d="M18 8a2 2 0 1 1 4 0v6a8 8 0 0 1-8 8h-2c-2.8 0-4.5-.86-5.99-2.34l-3.6-3.6a2 2 0 0 1 2.83-2.82L7 15"/></svg></span></span>
          <h2 class="hello">Hello!</h2>
        </div>
        <div class="muted">What are we doing today?</div>
      </div>
      <div class="sect">
        <h3>Get started</h3>
        <button class="start-card">
          <span class="icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="m16 6 4 14"/><path d="M12 6v14"/><path d="M8 8v12"/><path d="M4 4v16"/></svg></span>

        <div class="chip-stack">
          <button class="chip-btn try-chip">Help me analyze activity in this course</button>

          <button class="chip-btn try-chip">What can you do? How can you assist me with my tasks in Canvas?</button>

      <div id="chatContent"><div class="chat" id="chat"></div></div>
      <div id="spacer"></div>

  </div>

  <div class="foot">
    <div class="prompt-box" id="promptBox">
      <label class="prompt-label" for="promptInput">Enter a prompt</label>
      <textarea id="promptInput" rows="1" placeholder="Help me…"></textarea>
      <div class="prompt-controls">

      </div>
    </div>
    <div class="disclaimer">AI can make mistakes. Consider checking important information.</div>
  </div>
</div>

<script>
/* ---- Config via query params: ?bg=f2f4f5 (page bg), ?pad=16 ---- */
(function () {
  const q = new URLSearchParams(location.search)
  if (q.get('bg')) document.body.style.background = '#' + q.get('bg').replace('#', '')
  if (q.get('pad')) document.documentElement.style.setProperty('--pad', q.get('pad') + 'px')

/* ---- DOM refs ---- */
const scroller = document.getElementById('scroller')
const welcome = document.getElementById('welcome')
const chatWrap = document.getElementById('chatWrap')
const chatContent = document.getElementById('chatContent')
const chat = document.getElementById('chat')
const spacer = document.getElementById('spacer')
const promptInput = document.getElementById('promptInput')
const sendBtn = document.getElementById('sendBtn')

/* ---- Renderers ---- */
const esc = (s) => s.replace(/&/g, '&amp;').replace(/</g, '&lt;')

function renderLoadingHeader(taskLabel) {
  return '<div class="resp-hdr"><span class="spinner"></span>'
    + '<span class="task">' + esc(taskLabel || 'Thinking')
    + '<span class="dots"><span>.</span><span class="d2">.</span><span class="d3">.</span></span></span></div>'
}
function renderDoneHeader(duration) {
  return '<div class="resp-hdr done"><span style="flex:none;display:inline-flex">' + I.circleCheck(16) + '</span>'
    + '<span>Agent thought for ' + duration + '</span></div>'
}
function renderActions() {
  return '<div class="actions fade0">'
    + '<button class="icon-btn grey" aria-label="Copy response">' + I.copy + '</button>'
    + '<button class="icon-btn grey" aria-label="Like response">' + I.thumbsUp + '</button>'
    + '<button class="icon-btn grey" aria-label="Dislike response">' + I.thumbsDown + '</button></div>'
}
function renderResource(a) {
  return '<div class="resource fade300"><div class="lines">'
    + '<a class="lnk" href="#" onclick="return false">' + esc(a.title) + '</a>'
    + (a.subtitle ? '<span class="sub">' + esc(a.subtitle) + '</span>' : '')
    + '</div>' + (a.showExternalLink ? '<span class="ext">' + I.externalLink + '</span>' : '') + '</div>'
}
function renderToolApproval(a, id) {
  let h = '<div class="artifact fade300" data-approval="' + id + '">'
  h += '<div class="art-hdr"><h3>' + esc(a.toolName) + '</h3>'
    + '<span class="connector-chip">' + I.impact + '<span class="clabel">' + esc(a.connectorLabel) + '</span></span></div>'
  for (const p of a.params) {
    h += '<div class="param"><div class="param-row"><span class="plabel">' + esc(p.label) + '</span>'
      + '<span class="kebab-wrap"><button class="icon-btn grey kebab" aria-label="' + esc(p.label) + ' options">' + I.kebab + '</button>'
      + '<span class="kebab-menu"><button><span class="mi">' + I.copySm + '</span>Copy</button>'
      + '<button><span class="mi">' + I.pencil + '</span>Edit</button></span></span></div>'
      + '<div>' + p.value + '</div></div>'
  }
  if (a.plan) {
    h += '<div class="art-body"><div class="plan"><span class="ptitle">Plan</span><ul>'
    for (const it of a.plan.items) h += '<li>' + it + '</li>'
    h += '</ul></div></div>'
  }
  h += '<div class="art-footer"><div class="approval">'
    + '<div class="approval-btns">'
    + '<button class="ghost-btn ok" data-approve="' + id + '">' + I.check + 'Approve</button>'
    + '<button class="ghost-btn no" data-reject="' + id + '">' + I.x + 'Reject</button></div>'
    + '<div class="approval-hint">Or type below to request changes.</div>'
    + '</div></div></div>'
  return h
}
function renderFooterChips(prompts) {
  let h = '<div class="foot-chips fade600"><div class="chip-stack">'
  for (const p of prompts) h += '<button class="chip-btn sugg-chip">' + esc(p) + '</button>'
  return h + '</div></div>'
}

/* ---- Scroll system (mirrors the POC ChatFlow) ---- */
const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches
  || new URLSearchParams(location.search).has('auto')
let ro = null
let observedTurn = null
function recalc(scrollToTurn) {
  const turns = chat.querySelectorAll('.turn')
  const last = turns[turns.length - 1]
  if (!last) return
  const containerHeight = scroller.clientHeight
  const naturalScrollHeight = chatContent.offsetHeight
  const containerRect = scroller.getBoundingClientRect()
  const turnRect = last.getBoundingClientRect()
  const turnTopInContent = turnRect.top - containerRect.top + scroller.scrollTop
  const contentBelow = naturalScrollHeight - turnTopInContent - turnRect.height
  spacer.style.height = Math.max(0, containerHeight - turnRect.height - contentBelow) + 'px'
  if (scrollToTurn) {
    requestAnimationFrame(() => {
      const r = last.getBoundingClientRect()
      const target = r.top - scroller.getBoundingClientRect().top + scroller.scrollTop - 24
      scroller.scrollTo({ top: target, behavior: prefersReducedMotion ? 'instant' : 'smooth' })
    })
  }
  if (last !== observedTurn) {
    if (ro) ro.disconnect()
    observedTurn = last
    ro = new ResizeObserver(() => recalc(false))
    ro.observe(last)
  }
}

/* ---- Simulator ---- */
let scriptIndex = 0
let msgSeq = 0
const postApprovalById = {}

function currentLastFooter() {
  const f = chat.querySelector('.foot-chips')
  if (f) f.remove()
}

function pushTurn({ userText, taskLabel }) {
  currentLastFooter()
  const id = 'msg-' + (++msgSeq)
  const turn = document.createElement('div')
  turn.className = 'turn'
  turn.dataset.id = id
  let h = ''
  if (userText) h += '<div class="user-row"><div class="user-card">' + esc(userText) + '</div></div>'
  h += '<div class="resp fade0" data-resp>' + renderLoadingHeader(taskLabel) + '</div>'
  turn.innerHTML = h
  chat.appendChild(turn)
  recalc(true)
  return { id, turn }
}

function completeTurn(turn, entry, id) {
  const resp = turn.querySelector('[data-resp]')
  let h = renderDoneHeader(entry.duration || Math.round(LOADING_DELAY / 1000) + 's')
  if (entry.agentText) h += '<div>' + esc(entry.agentText) + '</div>'
  resp.innerHTML = h
  let after = ''
  const a = entry.attachment
  if (a && a.kind === 'resource') after += renderResource(a)
  if (a && a.kind === 'tool-approval') after += renderToolApproval(a, id)
  after += renderActions()
  const pendingApproval = a && a.kind === 'tool-approval'
  if (!pendingApproval && entry.suggestedPrompts) after += renderFooterChips(entry.suggestedPrompts)
  turn.insertAdjacentHTML('beforeend', after)
  recalc(true)
}

function submit() {
  if (welcome && !welcome.hidden) { welcome.hidden = true; chatWrap.hidden = false }
  const entry = SCRIPT[scriptIndex % SCRIPT.length]
  scriptIndex++
  const { id, turn } = pushTurn({ userText: entry.userText, taskLabel: entry.taskLabel })
  if (entry.postApproval) postApprovalById[id] = entry.postApproval
  setTimeout(() => completeTurn(turn, entry, id), LOADING_DELAY)
}

function approve(id) {
  const card = chat.querySelector('[data-approval="' + id + '"]')
  if (!card) return
  card.querySelectorAll('.ghost-btn').forEach((b) => { b.disabled = true })
  const hint = card.querySelector('.approval-hint')
  if (hint) hint.remove()
  card.querySelector('.approval').insertAdjacentHTML('beforeend',
    '<div class="alert-success"><span class="aicon">' + I.circleCheck(20) + '</span><span>This action was approved.</span></div>')
  const next = postApprovalById[id]
  if (!next) { recalc(false); return }
  const { turn } = pushTurn({ taskLabel: next.taskLabel })
  setTimeout(() => completeTurn(turn, next, null), LOADING_DELAY)
}

function resetChat() {
  scriptIndex = 0
  msgSeq = 0
  chat.innerHTML = ''
  spacer.style.height = '0px'
  if (ro) { ro.disconnect(); ro = null; observedTurn = null }
  chatWrap.hidden = true
  welcome.hidden = false
  scroller.scrollTop = 0
  promptInput.value = ''
  autogrow()
  waveHand()
}

/* ---- Input wiring ---- */
function autogrow() {
  promptInput.style.height = 'auto'
  promptInput.style.height = promptInput.scrollHeight + 'px'
  sendBtn.classList.toggle('ready', promptInput.value.trim().length > 0)
}
promptInput.addEventListener('input', autogrow)
promptInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault()
    doSend()
  }
})
sendBtn.addEventListener('click', doSend)
function doSend() {
  submit()
  promptInput.value = ''
  autogrow()
}

document.getElementById('newChatBtn').addEventListener('click', resetChat)

/* Approve / reject / kebab (delegated) */
document.addEventListener('click', (e) => {
  const ap = e.target.closest('[data-approve]')
  if (ap && !ap.disabled) { approve(ap.dataset.approve); return }
  const kb = e.target.closest('.kebab')
  document.querySelectorAll('.kebab-menu.open').forEach((m) => {
    if (!kb || m !== kb.nextElementSibling) m.classList.remove('open')
  })
  if (kb) kb.nextElementSibling.classList.toggle('open')
  if (e.target.closest('.kebab-menu')) e.target.closest('.kebab-menu').classList.remove('open')
})

/* Suggested-prompt chips focus the input (inert in the POC) */
document.addEventListener('click', (e) => {
  if (e.target.closest('.sugg-chip') || e.target.closest('.try-chip')) promptInput.focus()
})

/* ---- Welcome hand wave ---- */
const handWrap = document.getElementById('handWrap')
function waveHand() {
  handWrap.style.animation = 'none'
  void handWrap.offsetWidth
  handWrap.style.animation = 'agent-wave 0.7s ease-in-out'
  handWrap.addEventListener('animationend', () => { handWrap.style.animation = '' }, { once: true })
}
handWrap.addEventListener('mouseenter', waveHand)
setTimeout(waveHand, 400)

/* ---- Screenshot-test driver: ?auto=s,s,a&delay=50 (s=submit, a=approve last card) ---- */
;(function () {
  const q = new URLSearchParams(location.search)
  if (q.get('delay')) LOADING_DELAY = parseInt(q.get('delay'), 10)
  const auto = q.get('auto')
  if (!auto) return
  const steps = auto.split(',')
  let t = 100
  for (const step of steps) {
    if (step === 's') { setTimeout(submit, t); t += LOADING_DELAY + 300 }
    else if (step === 'a') {
      setTimeout(() => {
        const btns = chat.querySelectorAll('[data-approve]:not(:disabled)')
        const last = btns[btns.length - 1]
        if (last) approve(last.dataset.approve)
      }, t)
      t += LOADING_DELAY + 300
    }
  }
})()
